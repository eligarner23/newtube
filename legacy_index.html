<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NewTube Classic – Home</title>

    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        body { margin: 0; font-family: Arial, sans-serif; }

        body.light { background-color: #e2e2e2; color: black; }
        .topbar.light { background-color: #cc0000; color: white; }
        .video-box.light { background-color: white; color: black; }

        body.dark { background-color: #1a1a1a; color: white; }
        .topbar.dark { background-color: #111; color: white; }
        .video-box.dark { background-color: #2a2a2a; color: white; }

        .topbar {
            padding: 6px 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #000;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            margin-right: 30px;
            cursor: pointer;
        }

        .tabs { margin-left: 20px; font-size: 14px; }
        .tabs span { margin-right: 15px; cursor: pointer; color: white; }
        .tabs span:hover { text-decoration: underline; }

        .search-box { display: flex; flex: 1; margin-left: 40px; }
        .search-box input { width: 100%; padding: 5px; border: 1px solid #888; border-right: none; }
        .search-box button { padding: 6px 12px; border: 1px solid #888; background-color: #f2f2f2; cursor: pointer; }

        .nav-btn {
            margin-left: 15px;
            background-color: white;
            color: #cc0000;
            padding: 5px 10px;
            border: 1px solid #cc0000;
            cursor: pointer;
            font-weight: bold;
        }

        .container { width: 960px; margin: 20px auto; }

        .section-title {
            font-size: 20px;
            font-weight: bold;
            border-bottom: 1px solid #aaa;
            padding-bottom: 5px;
            margin-bottom: 15px;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .video-box {
            padding: 10px;
            border: 1px solid #aaa;
            cursor: pointer;
        }

        .video-thumb {
            width: 100%;
            height: 150px;
            background-color: #ccc;
            background-size: cover;
            background-position: center;
            border: 1px solid #888;
        }

        .video-title { font-size: 14px; font-weight: bold; margin-top: 8px; }
        .video-meta { font-size: 12px; color: #555; }
    </style>
</head>

<body>

<!-- Topbar -->
<div class="topbar">
    <div class="logo" onclick="location.href='legacy_index.html'">NewTube</div>

    <div class="tabs">
        <span onclick="location.href='legacy_search.html?q=all'">Videos</span>
        <span onclick="location.href='legacy_channels.html'">Channels</span>
        <span onclick="location.href='legacy_community.html'">Community</span>
        <span onclick="location.href='legacy_inbox.html'">Inbox</span>
    </div>

    <div class="search-box">
        <input id="searchInput" type="text" placeholder="Search videos…">
        <button onclick="doSearch()">Search</button>
    </div>

    <div id="authButtons" style="display:flex; gap:10px; margin-left:20px;"></div>
    <div id="guestLabel" style="margin-left:10px; font-weight:bold;"></div>
</div>

<!-- Main Content -->
<div class="container">
    <div class="section-title">Featured Videos</div>

    <div id="videoGrid" class="video-grid"></div>
</div>

<script>
// -------------------------------
// THEME SYSTEM
// -------------------------------
function applyTheme() {
    const theme = localStorage.getItem("user_theme") || "light";

    document.body.classList.remove("light", "dark");
    document.body.classList.add(theme);

    document.querySelector(".topbar").classList.remove("light", "dark");
    document.querySelector(".topbar").classList.add(theme);
}

applyTheme();

// -------------------------------
// SEARCH
// -------------------------------
function doSearch() {
    const q = document.getElementById("searchInput").value.trim();
    if (q) location.href = `legacy_search.html?q=${encodeURIComponent(q)}`;
}

// -------------------------------
// AUTH BUTTONS (HTML version)
// -------------------------------
function updateAuthButtons() {
    const username = localStorage.getItem("username") || "Guest_00000";
    const isGuest = !localStorage.getItem("token");

    const box = document.getElementById("authButtons");

    box.innerHTML = `
        <div class="nav-btn" onclick="location.href='legacy_upload.html'">Upload</div>
        <div class="nav-btn" onclick="location.href='channel.html?u=${username}'">My Channel</div>
        <div class="nav-btn" onclick="location.href='legacy_settings.html'">Settings</div>
        <div class="nav-btn" onclick="logout()">Logout</div>
    `;

    document.getElementById("guestLabel").textContent = isGuest ? "Guest Mode" : "";
}

function logout() {
    localStorage.removeItem("token");
    location.href = "legacy_index.html";
}

updateAuthButtons();

// -------------------------------
// LOAD VIDEOS FROM JSON
// -------------------------------
async function loadVideos() {
    const res = await fetch("videos.json");
    const videos = await res.json();

    const grid = document.getElementById("videoGrid");
    grid.innerHTML = "";

    videos.forEach(v => {
        const box = document.createElement("div");
        box.className = "video-box light";
        box.onclick = () => location.href = `legacy_watch.html?id=${v.id}`;

        box.innerHTML = `
            <div class="video-thumb" style="background-image:url('thumbs/${v.thumbnail}')"></div>
            <div class="video-title">${v.title}</div>
            <div class="video-meta">
                <a href="channel.html?u=${v.uploader}" style="color:inherit; text-decoration:none;">
                    ${v.uploader}
                </a>
                • ${v.views} views
            </div>
        `;

        grid.appendChild(box);
    });
}

loadVideos();
</script>

</body>
</html>
