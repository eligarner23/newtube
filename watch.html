<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>NewTube – Watch</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* Light Theme */
        body.light {
            background-color: #ececec;
            color: black;
        }

        .topbar.light {
            background-color: #cc0000;
            color: white;
        }

        .related-card.light,
        .comments-box.light,
        .comment-item.light {
            background-color: white;
            color: black;
        }

        /* Dark Theme */
        body.dark {
            background-color: #1a1a1a;
            color: white;
        }

        .topbar.dark {
            background-color: #111;
            color: white;
        }

        .related-card.dark,
        .comments-box.dark,
        .comment-item.dark {
            background-color: #2a2a2a;
            color: white;
        }

        /* Topbar */
        .topbar {
            padding: 10px 20px;
            display: flex;
            align-items: center;
        }

        .logo {
            font-size: 26px;
            font-weight: bold;
            margin-right: 30px;
            cursor: pointer;
        }

        .search-box {
            flex: 1;
            display: flex;
        }

        .search-box input {
            width: 100%;
            padding: 6px;
            border: none;
            border-radius: 2px 0 0 2px;
        }

        .search-box button {
            padding: 6px 12px;
            border: none;
            background: #f2f2f2;
            border-radius: 0 2px 2px 0;
            cursor: pointer;
        }

        .nav-btn {
            margin-left: 20px;
            background-color: white;
            color: #cc0000;
            padding: 6px 12px;
            border-radius: 3px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Layout */
        .container {
            display: flex;
            width: 95%;
            margin: 20px auto;
            gap: 20px;
        }

        .video-area {
            flex: 3;
        }

        .related {
            flex: 1.2;
        }

        .related-card {
            padding: 8px;
            border-radius: 4px;
            box-shadow: 0 0 3px rgba(0,0,0,0.2);
            margin-bottom: 10px;
            cursor: pointer;
            display: flex;
            gap: 10px;
        }

        .thumb {
            width: 120px;
            height: 70px;
            background-color: #ccc;
            background-size: cover;
            background-position: center;
            border-radius: 3px;
            flex-shrink: 0;
        }

        .title {
            font-size: 14px;
            font-weight: bold;
        }

        .meta {
            font-size: 12px;
            color: #aaa;
        }

        /* Comments */
        .comments-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 4px;
            box-shadow: 0 0 3px rgba(0,0,0,0.2);
        }

        .comment-item {
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 10px;
            box-shadow: 0 0 2px rgba(0,0,0,0.2);
        }

        .comment-user {
            font-weight: bold;
            color: #0066cc;
        }

        .comment-text {
            margin-top: 5px;
        }

        .comment-time {
            font-size: 12px;
            color: #888;
            margin-top: 3px;
        }

        textarea {
            width: 100%;
            height: 70px;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #aaa;
            resize: none;
        }

        .comment-btn {
            margin-top: 8px;
            padding: 8px 14px;
            background-color: #cc0000;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .comment-btn:hover {
            background-color: #b30000;
        }
    </style>
</head>

<body>

<div class="topbar">
    <div class="logo" onclick="location.href='index.html'">NewTube</div>

    <div class="search-box">
        <input id="searchInput" type="text" placeholder="Search videos…">
        <button onclick="doSearch()">Search</button>
    </div>

    <!-- Dynamic Login/Register/Logout/Settings -->
    <div id="authButtons" style="display:flex; gap:10px; margin-left:20px;"></div>

    <!-- Guest Mode Label -->
    <div id="guestLabel" style="margin-left:10px; font-weight:bold;"></div>
</div>

<div class="container">

    <!-- Main Video Area -->
    <div class="video-area">
        <video id="player" width="100%" height="auto" controls></video>

        <h2 id="videoTitle"></h2>
        <p id="videoMeta"></p>

        <!-- Comments Section -->
        <div id="commentsBox" class="comments-box">
            <h3>Comments</h3>

            <div id="commentList">Loading comments…</div>

            <textarea id="commentInput" placeholder="Add a comment…"></textarea>
            <button class="comment-btn" onclick="postComment()">Post</button>
            <p id="commentStatus"></p>
        </div>
    </div>

    <!-- Related Videos -->
    <div class="related">
        <h3>Related Videos</h3>
        <div id="relatedList"></div>
    </div>

</div>

<script>
// -------------------------------
// THEME SYSTEM
// -------------------------------
function applyTheme() {
    let theme = "light";
    const token = localStorage.getItem("token");

    theme = !token
        ? localStorage.getItem("g_theme") || "light"
        : localStorage.getItem("user_theme") || "light";

    document.body.classList.remove("light", "dark");
    document.body.classList.add(theme);

    document.querySelector(".topbar").classList.remove("light", "dark");
    document.querySelector(".topbar").classList.add(theme);

    document.querySelectorAll(".related-card, .comments-box, .comment-item").forEach(el => {
        el.classList.remove("light", "dark");
        el.classList.add(theme);
    });
}

applyTheme();

// -------------------------------
// Topbar Buttons + Guest Mode
// -------------------------------
function updateAuthButtons() {
    const token = localStorage.getItem("token");
    const box = document.getElementById("authButtons");

    if (token) {
        box.innerHTML = `
            <div class="nav-btn" onclick="location.href='upload.html'">Upload</div>
            <div class="nav-btn" onclick="location.href='settings.html'">Settings</div>
            <div class="nav-btn" onclick="logout()">Logout</div>
        `;
        showGuestLabel(false);
    } else {
        box.innerHTML = `
            <div class="nav-btn" onclick="location.href='upload.html'">Upload</div>
            <div class="nav-btn" onclick="location.href='settings.html'">Settings</div>
            <div class="nav-btn" onclick="location.href='login.html'">Login</div>
            <div class="nav-btn" onclick="location.href='register.html'">Register</div>
        `;
        showGuestLabel(true);
    }
}

function logout() {
    localStorage.removeItem("token");
    location.href = "index.html";
}

function showGuestLabel(isGuest) {
    const label = document.getElementById("guestLabel");
    label.style.color = "white";
    label.textContent = isGuest ? "Guest Mode" : "";
}

updateAuthButtons();

// -------------------------------
// Search bar logic
// -------------------------------
function doSearch() {
    const q = document.getElementById("searchInput").value.trim();
    if (q !== "") {
        location.href = `search.html?q=${encodeURIComponent(q)}`;
    }
}

// -------------------------------
// Load main video
// -------------------------------
const params = new URLSearchParams(window.location.search);
const videoId = params.get("id");

async function loadVideo() {
    const res = await fetch("backend/videos.json");
    const videos = await res.json();

    const video = videos.find(v => v.id == videoId);

    if (!video) {
        document.querySelector(".video-area").innerHTML = "<h2>Video not found.</h2>";
        return;
    }

    // Increment view count
    fetch(`backend/api.php?route=addView&id=${videoId}`);

    const player = document.getElementById("player");
    player.src = `uploads/${video.filename}`;

    document.getElementById("videoTitle").textContent = video.title;
    document.getElementById("videoMeta").textContent = `${video.uploader} • ${video.views + 1} views`;

    loadComments();
}

// -------------------------------
// Load related videos
// -------------------------------
async function loadRelated() {
    const res = await fetch("backend/videos.json");
    const videos = await res.json();

    const related = videos.filter(v => v.id != videoId);

    const box = document.getElementById("relatedList");

    related.forEach(v => {
        const card = document.createElement("div");
        card.className = "related-card";
        card.onclick = () => location.href = `watch.html?id=${v.id}`;

        card.innerHTML = `
            <div class="thumb" style="background-image:url('thumbnails/${v.thumbnail}');"></div>
            <div>
                <div class="title">${v.title}</div>
                <div class="meta">${v.uploader} • ${v.views} views</div>
            </div>
        `;

        box.appendChild(card);
    });

    applyTheme();
}

// -------------------------------
// COMMENTS SYSTEM
// -------------------------------
async function loadComments() {
    const res = await fetch(`backend/api.php?route=getComments&id=${videoId}`);
    const comments = await res.json();

    const list = document.getElementById("commentList");
    list.innerHTML = "";

    if (comments.length === 0) {
        list.innerHTML = "<p>No comments yet.</p>";
        return;
    }

    comments.forEach(c => {
        const item = document.createElement("div");
        item.className = "comment-item " + document.body.className;

        item.innerHTML = `
            <div class="comment-user">${c.user}</div>
            <div class="comment-text">${c.text}</div>
            <div class="comment-time">${c.time}</div>
        `;

        list.appendChild(item);
    });

    applyTheme();
}

async function postComment() {
    const text = document.getElementById("commentInput").value.trim();
    const token = localStorage.getItem("token") || "guest";

    if (!text) {
        document.getElementById("commentStatus").textContent = "Enter a comment.";
        return;
    }

    const res = await fetch("backend/api.php?route=addComment", {
        method: "POST",
        body: JSON.stringify({
            token,
            video: videoId,
            text
        })
    });

    const json = await res.json();

    if (json.success) {
        document.getElementById("commentInput").value = "";
        document.getElementById("commentStatus").textContent = "Posted!";
        loadComments();
    } else {
        document.getElementById("commentStatus").textContent = "Failed to post.";
    }
}

loadVideo();
loadRelated();
</script>

</body>
</html>
