<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NewTube – QR Login</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* Light Theme */
        body.light {
            background-color: #ececec;
            color: black;
        }

        .topbar.light {
            background-color: #cc0000;
            color: white;
        }

        .box.light {
            background-color: white;
            color: black;
        }

        /* Dark Theme */
        body.dark {
            background-color: #1a1a1a;
            color: white;
        }

        .topbar.dark {
            background-color: #111;
            color: white;
        }

        .box.dark {
            background-color: #2a2a2a;
            color: white;
        }

        /* Topbar */
        .topbar {
            padding: 10px 20px;
            display: flex;
            align-items: center;
        }

        .logo {
            font-size: 26px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Main Box */
        .box {
            width: 80%;
            margin: 40px auto;
            padding: 20px;
            border-radius: 4px;
            box-shadow: 0 0 4px rgba(0,0,0,0.2);
            text-align: center;
        }

        .btn {
            background-color: #cc0000;
            color: white;
            padding: 10px 18px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
        }

        .btn:hover {
            background-color: #b30000;
        }
    </style>
</head>

<body>

<!-- Topbar -->
<div class="topbar">
    <div class="logo" onclick="location.href='index.html'">NewTube</div>

    <!-- Guest Mode Label -->
    <div id="guestLabel" style="margin-left:auto; font-weight:bold;"></div>
</div>

<!-- Main Content -->
<div class="box" id="mainBox">
    <h2>Confirm Login</h2>
    <p>Tap the button below to confirm login on your other device.</p>

    <button class="btn" onclick="confirmLogin()">Confirm Login</button>

    <p id="status"></p>
</div>

<script>
// -------------------------------
// THEME SYSTEM
// -------------------------------
function applyTheme() {
    let theme = "light";
    const token = localStorage.getItem("token");

    if (!token) {
        theme = localStorage.getItem("g_theme") || "light";
        showGuestLabel(true);
    } else {
        theme = localStorage.getItem("user_theme") || "light";
        showGuestLabel(false);
    }

    document.body.classList.remove("light", "dark");
    document.body.classList.add(theme);

    const topbar = document.querySelector(".topbar");
    topbar.classList.remove("light", "dark");
    topbar.classList.add(theme);

    const box = document.getElementById("mainBox");
    box.classList.remove("light", "dark");
    box.classList.add(theme);
}

function showGuestLabel(isGuest) {
    const label = document.getElementById("guestLabel");
    label.style.color = "white";
    label.textContent = isGuest ? "Guest Mode" : "";
}

applyTheme();

// -------------------------------
// QR CONFIRMATION LOGIC
// -------------------------------
const params = new URLSearchParams(location.search);
const session = params.get("session");

if (!session) {
    document.getElementById("status").innerText = "Invalid QR session.";
}

async function confirmLogin() {
    const token = localStorage.getItem("token");

    if (!token) {
        document.getElementById("status").innerText =
            "You must be logged in on this device first.";
        return;
    }

    document.getElementById("status").innerText = "Confirming...";

    const res = await fetch("backend/api.php?route=qrConfirm", {
        method: "POST",
        body: JSON.stringify({ session, token })
    });

    const json = await res.json();

    if (json.success) {
        document.getElementById("status").innerText =
            "Login confirmed! You may now return to your other device.";
    } else {
        document.getElementById("status").innerText =
            "Failed to confirm login.";
    }
}
</script>

</body>
</html>
