<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NewTube – Register</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* Light Theme */
        body.light {
            background-color: #ececec;
            color: black;
        }

        .topbar.light {
            background-color: #cc0000;
            color: white;
        }

        .form-box.light {
            background-color: white;
            color: black;
        }

        /* Dark Theme */
        body.dark {
            background-color: #1a1a1a;
            color: white;
        }

        .topbar.dark {
            background-color: #111;
            color: white;
        }

        .form-box.dark {
            background-color: #2a2a2a;
            color: white;
        }

        /* Topbar */
        .topbar {
            padding: 10px 20px;
            display: flex;
            align-items: center;
        }

        .logo {
            font-size: 26px;
            font-weight: bold;
            margin-right: 30px;
            cursor: pointer;
        }

        .nav-btn {
            margin-left: 20px;
            background-color: white;
            color: #cc0000;
            padding: 6px 12px;
            border-radius: 3px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Register Box */
        .form-box {
            width: 40%;
            margin: 40px auto;
            padding: 20px;
            border-radius: 4px;
            box-shadow: 0 0 4px rgba(0,0,0,0.2);
        }

        .form-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group input {
            width: 100%;
            padding: 8px;
            border-radius: 3px;
            border: 1px solid #aaa;
        }

        .submit-btn {
            background-color: #cc0000;
            color: white;
            padding: 10px 18px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }

        .submit-btn:hover {
            background-color: #b30000;
        }
    </style>
</head>

<body>

<!-- Topbar -->
<div class="topbar">
    <div class="logo" onclick="location.href='index.html'">NewTube</div>

    <!-- Dynamic Buttons -->
    <div id="authButtons" style="display:flex; gap:10px; margin-left:auto;"></div>

    <!-- Guest Mode Label -->
    <div id="guestLabel" style="margin-left:10px; font-weight:bold;"></div>
</div>

<!-- Register Form -->
<div class="form-box" id="formBox">

    <div class="form-title">Create Your Account</div>

    <div class="input-group">
        <input id="username" type="text" placeholder="Username">
    </div>

    <div class="input-group">
        <input id="password" type="password" placeholder="Password">
    </div>

    <button class="submit-btn" onclick="registerUser()">Register</button>

    <p id="status"></p>

</div>

<script>
// -------------------------------
// THEME SYSTEM
// -------------------------------
function applyTheme() {
    let theme = "light";
    const token = localStorage.getItem("token");

    if (!token) {
        theme = localStorage.getItem("g_theme") || "light";
    } else {
        theme = localStorage.getItem("user_theme") || "light";
    }

    document.body.classList.remove("light", "dark");
    document.body.classList.add(theme);

    const topbar = document.querySelector(".topbar");
    topbar.classList.remove("light", "dark");
    topbar.classList.add(theme);

    const box = document.getElementById("formBox");
    box.classList.remove("light", "dark");
    box.classList.add(theme);
}

applyTheme();

// -------------------------------
// Topbar Buttons + Guest Mode
// -------------------------------
function updateAuthButtons() {
    const token = localStorage.getItem("token");
    const box = document.getElementById("authButtons");

    if (token) {
        box.innerHTML = `
            <div class="nav-btn" onclick="location.href='settings.html'">Settings</div>
            <div class="nav-btn" onclick="logout()">Logout</div>
        `;
        showGuestLabel(false);
    } else {
        box.innerHTML = `
            <div class="nav-btn" onclick="location.href='settings.html'">Settings</div>
            <div class="nav-btn" onclick="location.href='login.html'">Login</div>
            <div class="nav-btn" onclick="location.href='register.html'">Register</div>
        `;
        showGuestLabel(true);
    }
}

function logout() {
    localStorage.removeItem("token");
    location.href = "index.html";
}

function showGuestLabel(isGuest) {
    const label = document.getElementById("guestLabel");
    label.style.color = "white";
    label.textContent = isGuest ? "Guest Mode" : "";
}

updateAuthButtons();

// -------------------------------
// Register User
// -------------------------------
async function registerUser() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!username || !password) {
        document.getElementById("status").innerText = "Please fill out all fields.";
        return;
    }

    const data = { username, password };

    const res = await fetch("backend/api.php?route=register", {
        method: "POST",
        body: JSON.stringify(data)
    });

    const json = await res.json();

    if (json.success) {
        document.getElementById("status").innerText = "Account created! Redirecting...";
        setTimeout(() => location.href = "login.html", 1200);
    } else {
        document.getElementById("status").innerText = json.message || "Registration failed.";
    }
}
</script>

</body>
</html>
