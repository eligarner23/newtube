<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NewTube Classic – Watch</title>

    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        body { margin: 0; font-family: Arial, sans-serif; }

        body.light { background-color: #e2e2e2; color: black; }
        body.dark { background-color: #1a1a1a; color: white; }

        .topbar {
            padding: 6px 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #000;
        }
        .topbar.light { background-color: #cc0000; color: white; }
        .topbar.dark { background-color: #111; color: white; }

        .logo { font-size: 28px; font-weight: bold; margin-right: 30px; cursor: pointer; }

        .tabs span { margin-right: 15px; cursor: pointer; color: white; }
        .tabs span:hover { text-decoration: underline; }

        .search-box { display: flex; flex: 1; margin-left: 40px; }
        .search-box input { width: 100%; padding: 5px; border: 1px solid #888; border-right: none; }
        .search-box button { padding: 6px 12px; border: 1px solid #888; background-color: #f2f2f2; cursor: pointer; }

        .nav-btn {
            margin-left: 15px;
            background-color: white;
            color: #cc0000;
            padding: 5px 10px;
            border: 1px solid #cc0000;
            cursor: pointer;
            font-weight: bold;
        }

        .container {
            width: 960px;
            margin: 20px auto;
            display: flex;
            gap: 20px;
        }

        .video-area { flex: 3; }
        .sidebar { flex: 1.2; }

        .related-box {
            padding: 8px;
            border: 1px solid #aaa;
            margin-bottom: 10px;
            cursor: pointer;
            display: flex;
            gap: 10px;
        }

        .thumb {
            width: 120px;
            height: 70px;
            background-size: cover;
            background-position: center;
            border: 1px solid #888;
        }

        .title { font-size: 14px; font-weight: bold; }
        .meta { font-size: 12px; color: #555; }

        .video-description { margin-top: 10px; font-size: 14px; }
    </style>
</head>

<body>

<div class="topbar">
    <div class="logo" onclick="location.href='legacy_index.html'">NewTube</div>

    <div class="tabs">
        <span onclick="location.href='legacy_search.html?q=all'">Videos</span>
        <span onclick="location.href='legacy_channels.html'">Channels</span>
        <span onclick="location.href='legacy_community.html'">Community</span>
        <span onclick="location.href='legacy_inbox.html'">Inbox</span>
    </div>

    <div class="search-box">
        <input id="searchInput" type="text" placeholder="Search videos…">
        <button onclick="doSearch()">Search</button>
    </div>

    <div class="nav-btn" onclick="location.href='legacy_upload.html'">Upload</div>
    <div class="nav-btn" onclick="location.href='channel.html?u=' + (localStorage.getItem('username') || 'Guest')">My Channel</div>
    <div class="nav-btn" onclick="location.href='legacy_settings.html'">Settings</div>
    <div class="nav-btn" onclick="logout()">Logout</div>
</div>

<div class="container">

    <div class="video-area">
        <video id="player" width="100%" height="auto" controls></video>

        <h2 id="videoTitle"></h2>
        <p id="videoMeta"></p>
        <p id="videoDesc" class="video-description"></p>
    </div>

    <div class="sidebar">
        <h3>Related Videos</h3>
        <div id="relatedList"></div>
    </div>

</div>

<script>
// Theme
function applyTheme() {
    const theme = localStorage.getItem("user_theme") || "light";
    document.body.className = theme;
    document.querySelector(".topbar").className = "topbar " + theme;
}
applyTheme();

// Search
function doSearch() {
    const q = document.getElementById("searchInput").value.trim();
    if (q) location.href = `legacy_search.html?q=${encodeURIComponent(q)}`;
}

// Logout
function logout() {
    localStorage.removeItem("token");
    location.href = "legacy_index.html";
}

// Get ?id=video1
const params = new URLSearchParams(window.location.search);
const videoId = params.get("id");

// Load video
async function loadVideo() {
    const res = await fetch("videos.json");
    const videos = await res.json();

    const video = videos.find(v => v.id === videoId);

    if (!video) {
        document.querySelector(".video-area").innerHTML = "<h2>Video not found.</h2>";
        return;
    }

    document.getElementById("player").src = "videos/" + video.file;
    document.getElementById("videoTitle").textContent = video.title;
    document.getElementById("videoMeta").textContent =
        `${video.uploader} • ${video.views} views • Uploaded ${video.uploaded}`;
    document.getElementById("videoDesc").textContent = video.description;

    loadRelated(videos);
}

// Related videos
function loadRelated(videos) {
    const box = document.getElementById("relatedList");

    videos.forEach(v => {
        if (v.id !== videoId) {
            box.innerHTML += `
                <div class="related-box" onclick="location.href='legacy_watch.html?id=${v.id}'">
                    <div class="thumb" style="background-image:url('thumbs/${v.thumbnail}')"></div>
                    <div>
                        <div class="title">${v.title}</div>
                        <div class="meta">${v.uploader} • ${v.views} views</div>
                    </div>
                </div>
            `;
        }
    });
}

loadVideo();
</script>

</body>
</html>
