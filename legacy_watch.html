<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NewTube Classic – Watch</title>

    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* Light Theme */
        body.light { background-color: #e2e2e2; color: black; }
        .topbar.light { background-color: #cc0000; color: white; }
        .video-box.light, .comment-item.light { background-color: white; color: black; }

        /* Dark Theme */
        body.dark { background-color: #1a1a1a; color: white; }
        .topbar.dark { background-color: #111; color: white; }
        .video-box.dark, .comment-item.dark { background-color: #2a2a2a; color: white; }

        /* Topbar */
        .topbar {
            padding: 6px 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #000;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            margin-right: 30px;
            cursor: pointer;
        }

        .tabs { margin-left: 20px; font-size: 14px; }
        .tabs span { margin-right: 15px; cursor: pointer; color: white; }
        .tabs span:hover { text-decoration: underline; }

        .search-box { display: flex; flex: 1; margin-left: 40px; }
        .search-box input { width: 100%; padding: 5px; border: 1px solid #888; border-right: none; }
        .search-box button { padding: 6px 12px; border: 1px solid #888; background-color: #f2f2f2; cursor: pointer; }

        .nav-btn {
            margin-left: 15px;
            background-color: white;
            color: #cc0000;
            padding: 5px 10px;
            border: 1px solid #cc0000;
            cursor: pointer;
            font-weight: bold;
        }

        /* Layout */
        .container {
            width: 960px;
            margin: 20px auto;
            display: flex;
            gap: 20px;
        }

        .video-area { flex: 3; }
        .sidebar { flex: 1.2; }

        .related-box {
            padding: 8px;
            border: 1px solid #aaa;
            margin-bottom: 10px;
            cursor: pointer;
            display: flex;
            gap: 10px;
        }

        .thumb {
            width: 120px;
            height: 70px;
            background-color: #ccc;
            background-size: cover;
            background-position: center;
            border: 1px solid #888;
        }

        .title { font-size: 14px; font-weight: bold; }
        .meta { font-size: 12px; color: #555; }

        /* Comments */
        .comments-section {
            margin-top: 20px;
            padding: 10px;
            border-top: 1px solid #aaa;
        }

        .comment-item {
            padding: 8px;
            border-bottom: 1px solid #ccc;
            margin-bottom: 8px;
        }

        .comment-user { font-weight: bold; color: #0033cc; }
        .comment-text { margin-top: 3px; }
        .comment-time { font-size: 12px; color: #777; }
    </style>
</head>

<body>

<!-- Topbar -->
<div class="topbar">
    <div class="logo" onclick="location.href='legacy_index.html'">NewTube</div>

    <div class="tabs">
        <span onclick="location.href='legacy_search.html?q=all'">Videos</span>
        <span onclick="location.href='legacy_channels.html'">Channels</span>
        <span onclick="location.href='legacy_community.html'">Community</span>
        <span onclick="location.href='legacy_inbox.html'">Inbox</span>
    </div>

    <div class="search-box">
        <input id="searchInput" type="text" placeholder="Search videos…">
        <button onclick="doSearch()">Search</button>
    </div>

    <div id="authButtons" style="display:flex; gap:10px; margin-left:20px;"></div>
    <div id="guestLabel" style="margin-left:10px; font-weight:bold;"></div>
</div>

<div class="container">

    <!-- Main Video Area -->
    <div class="video-area">
        <video id="player" width="100%" height="auto" controls></video>

        <h2 id="videoTitle"></h2>
        <p id="videoMeta"></p>

        <!-- Comments -->
        <div class="comments-section">
            <h3>Comments</h3>

            <div id="commentList">Loading comments…</div>

            <textarea id="commentInput" placeholder="Add a comment…" style="width:100%;height:60px;margin-top:10px;"></textarea>
            <button onclick="postComment()" style="margin-top:6px;padding:6px 12px;">Post</button>
            <p id="commentStatus"></p>
        </div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">
        <h3>Related Videos</h3>
        <div id="relatedList"></div>
    </div>

</div>

<script>
// -------------------------------
// THEME SYSTEM
// -------------------------------
function applyTheme() {
    let theme = localStorage.getItem("token")
        ? localStorage.getItem("user_theme") || "light"
        : localStorage.getItem("g_theme") || "light";

    document.body.className = theme;
    document.querySelector(".topbar").className = "topbar " + theme;

    document.querySelectorAll(".comment-item").forEach(el => {
        el.className = "comment-item " + theme;
    });
}

applyTheme();

// -------------------------------
// AUTH BUTTONS
// -------------------------------
function updateAuthButtons() {
    const token = localStorage.getItem("token");
    const box = document.getElementById("authButtons");

    if (token) {
        box.innerHTML = `
            <div class="nav-btn" onclick="location.href='legacy_upload.html'">Upload</div>
            <div class="nav-btn" onclick="location.href='legacy_settings.html'">Settings</div>
            <div class="nav-btn" onclick="logout()">Logout</div>
        `;
        document.getElementById("guestLabel").textContent = "";
    } else {
        box.innerHTML = `
            <div class="nav-btn" onclick="location.href='legacy_upload.html'">Upload</div>
            <div class="nav-btn" onclick="location.href='legacy_settings.html'">Settings</div>
            <div class="nav-btn" onclick="location.href='legacy_login.html'">Login</div>
            <div class="nav-btn" onclick="location.href='legacy_register.html'">Register</div>
        `;
        document.getElementById("guestLabel").textContent = "Guest Mode";
    }
}

function logout() {
    localStorage.removeItem("token");
    location.href = "legacy_index.html";
}

updateAuthButtons();

// -------------------------------
// SEARCH
// -------------------------------
function doSearch() {
    const q = document.getElementById("searchInput").value.trim();
    if (q) location.href = `legacy_search.html?q=${encodeURIComponent(q)}`;
}

// -------------------------------
// LOAD VIDEO
// -------------------------------
const params = new URLSearchParams(window.location.search);
const videoId = params.get("id");

async function loadVideo() {
    const res = await fetch("backend/videos.json");
    const videos = await res.json();

    const video = videos.find(v => v.id == videoId);

    if (!video) {
        document.querySelector(".video-area").innerHTML = "<h2>Video not found.</h2>";
        return;
    }

    // Increment view count
    fetch(`backend/api.php?route=addView&id=${videoId}`);

    document.getElementById("player").src = `uploads/${video.filename}`;
    document.getElementById("videoTitle").textContent = video.title;
    document.getElementById("videoMeta").textContent = `${video.uploader} • ${video.views + 1} views`;

    loadComments();
}

// -------------------------------
// RELATED VIDEOS
// -------------------------------
async function loadRelated() {
    const res = await fetch("backend/videos.json");
    const videos = await res.json();

    const related = videos.filter(v => v.id != videoId);

    const box = document.getElementById("relatedList");

    related.forEach(v => {
        box.innerHTML += `
            <div class="related-box" onclick="location.href='legacy_watch.html?id=${v.id}'">
                <div class="thumb" style="background-image:url('thumbnails/${v.thumbnail}')"></div>
                <div>
                    <div class="title">${v.title}</div>
                    <div class="meta">${v.uploader} • ${v.views} views</div>
                </div>
            </div>
        `;
    });
}

// -------------------------------
// COMMENTS SYSTEM
// -------------------------------
async function loadComments() {
    const res = await fetch(`backend/api.php?route=getComments&id=${videoId}`);
    const comments = await res.json();

    const list = document.getElementById("commentList");
    list.innerHTML = "";

    if (comments.length === 0) {
        list.innerHTML = "<p>No comments yet.</p>";
        return;
    }

    comments.forEach(c => {
        list.innerHTML += `
            <div class="comment-item ${document.body.className}">
                <div class="comment-user">${c.user}</div>
                <div class="comment-text">${c.text}</div>
                <div class="comment-time">${c.time}</div>
            </div>
        `;
    });

    applyTheme();
}

async function postComment() {
    const text = document.getElementById("commentInput").value.trim();
    const token = localStorage.getItem("token") || "guest";

    if (!text) {
        document.getElementById("commentStatus").textContent = "Enter a comment.";
        return;
    }

    const res = await fetch("backend/api.php?route=addComment", {
        method: "POST",
        body: JSON.stringify({
            token,
            video: videoId,
            text
        })
    });

    const json = await res.json();

    if (json.success) {
        document.getElementById("commentInput").value = "";
        document.getElementById("commentStatus").textContent = "Posted!";
        loadComments();
    } else {
        document.getElementById("commentStatus").textContent = "Failed to post.";
    }
}

loadVideo();
loadRelated();
</script>

</body>
</html>
