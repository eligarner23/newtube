<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NewTube – Upload</title>

    <style>
        body { margin: 0; font-family: Arial, sans-serif; }
        body.light { background-color: #ececec; color: black; }
        body.dark { background-color: #1a1a1a; color: white; }

        .topbar { padding: 10px 20px; display: flex; align-items: center; }
        .topbar.light { background-color: #cc0000; color: white; }
        .topbar.dark { background-color: #111; color: white; }

        .logo { font-size: 26px; font-weight: bold; margin-right: 30px; cursor: pointer; }
        .nav-btn { margin-left: 20px; background-color: white; color: #cc0000; padding: 6px 12px; border-radius: 3px; cursor: pointer; font-weight: bold; }

        .upload-box {
            width: 50%;
            margin: 40px auto;
            padding: 20px;
            border-radius: 4px;
            box-shadow: 0 0 4px rgba(0,0,0,0.2);
        }

        .upload-box.light { background-color: white; color: black; }
        .upload-box.dark { background-color: #2a2a2a; color: white; }

        .section-title { font-size: 22px; font-weight: bold; margin-bottom: 15px; }
        .input-group { margin-bottom: 15px; }
        .input-group input { width: 100%; padding: 8px; border-radius: 3px; border: 1px solid #aaa; }

        .submit-btn { background-color: #cc0000; color: white; padding: 10px 18px; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        .submit-btn:hover { background-color: #b30000; }

        textarea { width: 100%; height: 150px; margin-top: 20px; }
    </style>
</head>

<body>

<div class="topbar" id="topbar">
    <div class="logo" onclick="location.href='index.html'">NewTube</div>
    <div id="authButtons" style="display:flex; gap:10px; margin-left:auto;"></div>
    <div id="guestLabel" style="margin-left:10px; font-weight:bold;"></div>
</div>

<div class="upload-box" id="uploadBox">

    <div class="section-title">Upload a Video (Static Mode)</div>

    <div class="input-group">
        <input id="title" type="text" placeholder="Video Title">
    </div>

    <div class="input-group">
        <label>Video File:</label>
        <input id="videoFile" type="file" accept="video/*">
    </div>

    <div class="input-group">
        <label>Thumbnail:</label>
        <input id="thumbFile" type="file" accept="image/*">
    </div>

    <button class="submit-btn" onclick="generateJSON()">Generate JSON</button>

    <textarea id="jsonOutput" placeholder="Your JSON will appear here..."></textarea>

    <p id="status"></p>
</div>

<script>
// THEME
function applyTheme() {
    const theme = localStorage.getItem("user_theme") || "light";
    document.body.classList.remove("light", "dark");
    document.body.classList.add(theme);

    document.getElementById("topbar").classList.remove("light", "dark");
    document.getElementById("topbar").classList.add(theme);

    document.getElementById("uploadBox").classList.remove("light", "dark");
    document.getElementById("uploadBox").classList.add(theme);
}
applyTheme();

// AUTH BUTTONS
function updateAuthButtons() {
    const username = localStorage.getItem("username") || "Guest_" + Math.floor(Math.random()*99999);
    localStorage.setItem("username", username);

    const box = document.getElementById("authButtons");

    box.innerHTML = `
        <div class="nav-btn" onclick="location.href='upload.html'">Upload</div>
        <div class="nav-btn" onclick="location.href='settings.html'">Settings</div>
        <div class="nav-btn" onclick="logout()">Logout</div>
    `;

    document.getElementById("guestLabel").textContent =
        username.startsWith("Guest") ? "Guest Mode" : "";
}
updateAuthButtons();

function logout() {
    localStorage.removeItem("username");
    location.reload();
}

// JSON GENERATOR
function generateJSON() {
    const title = document.getElementById("title").value.trim();
    const video = document.getElementById("videoFile").files[0];
    const thumb = document.getElementById("thumbFile").files[0];

    if (!title || !video || !thumb) {
        document.getElementById("status").innerText = "Missing required fields.";
        return;
    }

    const id = video.name.replace(/\.[^/.]+$/, "");

    const json = {
        id: id,
        title: title,
        description: "",
        thumbnail: thumb.name,
        file: video.name,
        channel: localStorage.getItem("username") || "Guest",
        views: 0,
        uploaded: new Date().toISOString().split("T")[0]
    };

    document.getElementById("jsonOutput").value = JSON.stringify(json, null, 4);
    document.getElementById("status").innerText = "Copy this JSON into videos.json and upload your files to GitHub.";
}
</script>

</body>
</html>
