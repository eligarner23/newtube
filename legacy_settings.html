<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NewTube Classic – Settings</title>

    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* Light Theme */
        body.light {
            background-color: #e2e2e2;
            color: black;
        }

        .topbar.light {
            background-color: #cc0000;
            color: white;
        }

        .settings-box.light {
            background-color: white;
            color: black;
        }

        /* Dark Theme */
        body.dark {
            background-color: #1a1a1a;
            color: white;
        }

        .topbar.dark {
            background-color: #111;
            color: white;
        }

        .settings-box.dark {
            background-color: #2a2a2a;
            color: white;
        }

        /* Classic Topbar */
        .topbar {
            padding: 8px 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #000;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            margin-right: 30px;
            cursor: pointer;
        }

        .nav-btn {
            margin-left: 15px;
            background-color: white;
            color: #cc0000;
            padding: 5px 10px;
            border: 1px solid #cc0000;
            cursor: pointer;
            font-weight: bold;
        }

        /* Settings Box */
        .settings-box {
            width: 60%;
            margin: 25px auto;
            padding: 15px;
            border: 1px solid #aaa;
        }

        .section-title {
            font-size: 20px;
            font-weight: bold;
            border-bottom: 1px solid #aaa;
            padding-bottom: 5px;
            margin-bottom: 15px;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-label {
            font-weight: bold;
            margin-bottom: 5px;
            display: block;
        }

        .save-btn {
            background-color: #cc0000;
            color: white;
            padding: 8px 14px;
            border: 1px solid #880000;
            cursor: pointer;
            font-weight: bold;
        }

        .save-btn:hover {
            background-color: #b30000;
        }

        .layout-btn {
            background-color: #cc0000;
            color: white;
            padding: 6px 12px;
            border: 1px solid #880000;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>

<body>

<!-- Classic Topbar -->
<div class="topbar">
    <div class="logo" onclick="location.href='legacy_index.html'">NewTube Classic</div>

    <div id="authButtons" style="display:flex; gap:10px; margin-left:auto;"></div>

    <div id="guestLabel" style="margin-left:10px; font-weight:bold;"></div>
</div>

<!-- Settings Panel -->
<div class="settings-box" id="settingsBox">

    <div class="section-title">User Settings</div>

    <!-- Theme -->
    <div class="input-group">
        <label class="input-label">Theme:</label>
        <select id="theme">
            <option value="light">Light</option>
            <option value="dark">Dark</option>
        </select>
    </div>

    <!-- Autoplay -->
    <div class="input-group">
        <label class="input-label">Autoplay:</label>
        <input type="checkbox" id="autoplay">
    </div>

    <!-- Quality -->
    <div class="input-group">
        <label class="input-label">Default Quality:</label>
        <select id="quality">
            <option value="auto">Auto</option>
            <option value="1080p">1080p</option>
            <option value="720p">720p</option>
            <option value="480p">480p</option>
        </select>
    </div>

    <!-- Comments -->
    <div class="input-group">
        <label class="input-label">Enable Comments:</label>
        <input type="checkbox" id="comments">
    </div>

    <!-- ⭐ UPDATED: Layout Reset Button -->
    <div class="input-group">
        <label class="input-label">Layout:</label>
        <button class="layout-btn" onclick="resetLayout()">Change Layout</button>
    </div>

    <button class="save-btn" onclick="saveSettings()">Save Settings</button>

    <p id="status"></p>

</div>

<script>
// -------------------------------
// THEME SYSTEM
// -------------------------------
function applyTheme() {
    let theme = localStorage.getItem("token")
        ? localStorage.getItem("user_theme") || "light"
        : localStorage.getItem("g_theme") || "light";

    document.body.className = theme;
    document.querySelector(".topbar").className = "topbar " + theme;
    document.getElementById("settingsBox").className = "settings-box " + theme;
}

applyTheme();

// -------------------------------
// ⭐ NEW: Reset Layout
// -------------------------------
function resetLayout() {
    localStorage.removeItem("g_layout");
    localStorage.removeItem("user_layout");
    location.href = "layouts.html";
}

// -------------------------------
// Topbar Buttons + Guest Mode
// -------------------------------
function updateAuthButtons() {
    const token = localStorage.getItem("token");
    const box = document.getElementById("authButtons");

    if (token) {
        box.innerHTML = `
            <div class="nav-btn" onclick="location.href='upload.html'">Upload</div>
            <div class="nav-btn" onclick="location.href='legacy_settings.html'">Settings</div>
            <div class="nav-btn" onclick="logout()">Logout</div>
        `;
        document.getElementById("guestLabel").textContent = "";
    } else {
        box.innerHTML = `
            <div class="nav-btn" onclick="location.href='legacy_settings.html'">Settings</div>
            <div class="nav-btn" onclick="location.href='login.html'">Login</div>
            <div class="nav-btn" onclick="location.href='register.html'">Register</div>
        `;
        document.getElementById("guestLabel").textContent = "Guest Mode";
    }
}

function logout() {
    localStorage.removeItem("token");
    location.href = "legacy_index.html";
}

updateAuthButtons();

// -------------------------------
// Load settings
// -------------------------------
const token = localStorage.getItem("token");

async function loadSettings() {
    if (!token) {
        document.getElementById("theme").value = localStorage.getItem("g_theme") || "light";
        document.getElementById("autoplay").checked = localStorage.getItem("g_autoplay") === "true";
        document.getElementById("quality").value = localStorage.getItem("g_quality") || "auto";
        document.getElementById("comments").checked = localStorage.getItem("g_comments") === "true";
        document.getElementById("status").innerText = "Guest Mode: Settings saved locally.";
        return;
    }

    const res = await fetch(`backend/api.php?route=getSettings&token=${token}`);
    const s = await res.json();

    document.getElementById("theme").value = s.theme;
    document.getElementById("autoplay").checked = s.autoplay;
    document.getElementById("quality").value = s.quality;
    document.getElementById("comments").checked = s.comments;

    localStorage.setItem("user_theme", s.theme);
    applyTheme();
}

// -------------------------------
// Save settings
// -------------------------------
async function saveSettings() {
    const theme = document.getElementById("theme").value;

    if (!token) {
        localStorage.setItem("g_theme", theme);
        localStorage.setItem("g_autoplay", document.getElementById("autoplay").checked);
        localStorage.setItem("g_quality", document.getElementById("quality").value);
        localStorage.setItem("g_comments", document.getElementById("comments").checked);

        applyTheme();
        document.getElementById("status").innerText = "Guest settings saved locally!";
        return;
    }

    const data = {
        token,
        theme,
        autoplay: document.getElementById("autoplay").checked,
        quality: document.getElementById("quality").value,
        comments: document.getElementById("comments").checked
    };

    const res = await fetch("backend/api.php?route=saveSettings", {
        method: "POST",
        body: JSON.stringify(data)
    });

    const json = await res.json();

    if (json.success) {
        localStorage.setItem("user_theme", theme);
        applyTheme();
        document.getElementById("status").innerText = "Settings saved!";
    } else {
        document.getElementById("status").innerText = "Failed to save settings.";
    }
}

loadSettings();
</script>

</body>
</html>
