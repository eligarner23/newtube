<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NewTube – Broadcast Yourself Again</title>

    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        body { margin: 0; font-family: Arial, sans-serif; }

        body.light { background-color: #ececec; color: black; }
        .topbar.light { background-color: #cc0000; color: white; }
        .video-card.light { background-color: white; color: black; }

        body.dark { background-color: #1a1a1a; color: white; }
        .topbar.dark { background-color: #111; color: white; }
        .video-card.dark { background-color: #2a2a2a; color: white; }

        .topbar {
            padding: 10px 20px;
            display: flex;
            align-items: center;
        }

        .logo {
            font-size: 26px;
            font-weight: bold;
            margin-right: 30px;
            cursor: pointer;
        }

        .search-box {
            flex: 1;
            display: flex;
        }

        .search-box input {
            width: 100%;
            padding: 6px;
            border: none;
            border-radius: 2px 0 0 2px;
        }

        .search-box button {
            padding: 6px 12px;
            border: none;
            background-color: #f2f2f2;
            border-radius: 0 2px 2px 0;
            cursor: pointer;
        }

        .nav-btn {
            margin-left: 20px;
            background-color: white;
            color: #cc0000;
            padding: 6px 12px;
            border-radius: 3px;
            cursor: pointer;
            font-weight: bold;
        }

        .content {
            width: 90%;
            margin: 20px auto;
        }

        .section-title {
            font-size: 20px;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .video-card {
            padding: 10px;
            border-radius: 4px;
            box-shadow: 0 0 3px rgba(0,0,0,0.2);
            cursor: pointer;
        }

        .thumbnail {
            width: 100%;
            height: 120px;
            background-color: #d0d0d0;
            border-radius: 3px;
            background-size: cover;
            background-position: center;
        }

        .video-title {
            font-size: 14px;
            margin-top: 8px;
            font-weight: bold;
        }

        .video-meta {
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>

<body>

    <!-- Top Navigation -->
    <div class="topbar">
        <div class="logo" onclick="location.href='index.html'">NewTube</div>

        <div class="search-box">
            <input id="searchInput" type="text" placeholder="Search videos…">
            <button onclick="doSearch()">Search</button>
        </div>

        <div id="authButtons" style="display:flex; gap:10px; margin-left:20px;"></div>
        <div id="guestLabel" style="margin-left:10px; font-weight:bold;"></div>
    </div>

    <div class="content">
        <div class="section-title">Featured Videos</div>

        <!-- JS will fill this -->
        <div id="videoGrid" class="video-grid"></div>
    </div>

<script>
// THEME SYSTEM (unchanged)
function applyTheme() {
    let theme = localStorage.getItem("user_theme") || "light";

    document.body.classList.remove("light", "dark");
    document.body.classList.add(theme);

    const topbar = document.querySelector(".topbar");
    topbar.classList.remove("light", "dark");
    topbar.classList.add(theme);
}

applyTheme();

// AUTH BUTTONS (static version)
function updateAuthButtons() {
    const username = localStorage.getItem("username") || "Guest_" + Math.floor(Math.random()*99999);
    localStorage.setItem("username", username);

    const box = document.getElementById("authButtons");

    box.innerHTML = `
        <div class="nav-btn" onclick="location.href='upload.html'">Upload</div>
        <div class="nav-btn" onclick="location.href='channel.html?u=${username}'">My Channel</div>
        <div class="nav-btn" onclick="location.href='settings.html'">Settings</div>
        <div class="nav-btn" onclick="logout()">Logout</div>
    `;

    document.getElementById("guestLabel").textContent =
        username.startsWith("Guest") ? "Guest Mode" : "";
}

updateAuthButtons();

// LOGOUT
function logout() {
    localStorage.removeItem("username");
    location.reload();
}

// SEARCH
function doSearch() {
    const q = document.getElementById("searchInput").value.trim();
    if (q !== "") {
        location.href = `search.html?q=${encodeURIComponent(q)}`;
    }
}
</script>

<script src="index.js"></script>

</body>
</html>
